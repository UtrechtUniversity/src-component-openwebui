---
- name: Install and configure ollama and openwebui
  hosts:
    - all
  vars:
    _fqdn: "{{ workspace_fqdn | default('localhost:8080') }}" # workspace_fqdn is a special component parameter defined in SRC
    _openwebui_url: "{{ _fqdn is match 'localhost:' | ternary('http://', 'https://') }}{{ _fqdn }}"
    _api_credentials: "{{ (api_credentials.split('\\n') | list | join('\n') | from_yaml) if api_credentials_secret is defined and api_credentials_secret.length > 0 else omit }}"
  gather_facts: true
  roles:
    - role: ollama-serve
      vars:
        ollama_serve_model: "{{ model }}"
        ollama_serve_version: "{{ ollama_version | default('') }}"
        ollama_serve_use_external_storage: "{{ ollama_use_external_storage | default(true, true) | bool }}"
    - role: openwebui
      vars:
        openwebui_url: "{{ _openwebui_url }}"
        openwebui_port: 8080
    - role: uusrc.general.nginx_reverse_proxy
      vars:
        nginx_location_auth_info: "{{ _api_credentials if _api_credentials is defined else omit }}"
        nginx_reverse_proxy_locations:
          - name: openwebui
            location: /
            auth: sram
            proxy_pass: http://localhost:8080
            proxy_set_header:
              X-Remote-User-Mail: $username@localhost
          - name: api
            location: /ext/api/ # serve the api under a special route to connect to it directly (instead of via the UI)
            auth: "{{ 'sram' if not (expose_api | default(true, true) | bool) else (api_credentials | ternary('basic', 'noauth')) }}"
            proxy_pass: http://localhost:8080/api/
            proxy_set_header:
              X-Remote-User-Mail: '""' # ensure outside clients cannot set a trusted header
