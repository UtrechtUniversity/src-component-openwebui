---
driver:
  name: podman
  image_settings: &image_settings
    pre_build_image: true
    registry:
      url: $DOCKER_REGISTRY
      credentials:
        username: $DOCKER_USER
        password: $DOCKER_PW
platforms:
  - name: workspace-src-ubuntu_noble
    image: ghcr.io/utrechtuniversity/src-test-workspace:ubuntu_noble-nginx
    <<: *image_settings
    command: /sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    published_ports:
      - 80/tcp
provisioner:
  name: ansible
  config_options:
    defaults:
      remote_tmp: /tmp
  env:
    variable_host: all
    components:
      - name: openwebui
        path: playbook.yml
        parameters:
          api_credentials_secret: foo bar
          expose_api: true
          model: "" # don't pull a model in CI
          workspace_fqdn: localhost
scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # - idempotence
    - verify
    - cleanup
    - destroy
